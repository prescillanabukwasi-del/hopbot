<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HopeBot Journal</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- External Stylesheet -->
  <link rel="stylesheet" href="style.css">
  <style>
    .journal-container {
      max-width: 800px;
      margin: 40px auto;
      background-color: var(--white);
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .journal-header {
      text-align: center;
      margin-bottom: 20px;
      color: var(--primary-maroon);
      font-weight: 700;
      font-size: 1.5rem;
    }

    textarea {
      width: 100%;
      height: 120px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: none;
      font-size: 1rem;
      margin-bottom: 10px;
    }

    .btn {
      background-color: var(--primary-maroon);
      color: var(--white);
      padding: 10px 15px;
      border-radius: 8px;
      border: none;
      margin-right: 10px;
      cursor: pointer;
      transition: background 0.3s;
      font-weight: 600;
    }

    .btn:hover {
      background-color: var(--primary-maroon-dark);
    }

    .entries {
      margin-top: 20px;
    }

    .entry {
      background-color: #FFF6F6;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      position: relative;
    }

    .entry button {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #d90404;
      font-size: 0.8rem;
      padding: 5px 8px;
    }

    .entry button:hover {
      background-color: #b10303;
    }

    .journal-intro {
      text-align: center;
      padding: 15px 0;
      color: var(--text-dark);
      font-size: 1rem;
    }

    .journal-intro i {
      color: var(--primary-maroon);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1><i class="fas fa-robot"></i> HopeBot</h1>
    <div class="burger" id="burger">
      <div></div>
      <div></div>
      <div></div>
    </div>
    <nav id="nav-links">
      <a href="index.html">Home</a>
      <a href="chat.html">Chat</a>
      <a href="journal.html">Journal</a>
      <a href="report.html">Report</a>
      <a href="breathing.html">Breathing</a>
      <a href="mindgames.html">Mind Games</a>
      <a href="help.html">Help</a>
    </nav>
  </header>

  <!-- Journal Intro -->
  <div class="journal-intro">
    <i class="fas fa-info-circle"></i> Use this journal to write down your thoughts, feelings, or notes. All entries are private and saved on this device.
  </div>

  <!-- Journal Container -->
  <div class="journal-container">
    <textarea id="entry-input" placeholder="Write your journal entry here..."></textarea>
    <button class="btn" id="save-btn"><i class="fas fa-save"></i> Save</button>
    <button class="btn" id="clear-btn"><i class="fas fa-trash"></i> Clear All</button>

    <div class="entries" id="entries">
      <!-- Saved entries will appear here -->
    </div>
  </div>

  <!-- Scripts -->
  <script>
    // Hamburger toggle
    const burger = document.getElementById('burger');
    const nav = document.getElementById('nav-links');
    burger.addEventListener('click', () => {
      nav.classList.toggle('active');
    });

    // Journal functionality
    const saveBtn = document.getElementById('save-btn');
    const clearBtn = document.getElementById('clear-btn');
    const entryInput = document.getElementById('entry-input');
    const entriesDiv = document.getElementById('entries');

    // Load entries from localStorage
    let entries = JSON.parse(localStorage.getItem('journalEntries')) || [];

    function displayEntries() {
      entriesDiv.innerHTML = '';
      entries.forEach((entry, index) => {
        const entryDiv = document.createElement('div');
        entryDiv.classList.add('entry');
        entryDiv.innerHTML = `<p>${entry}</p><button onclick="deleteEntry(${index})"><i class="fas fa-trash"></i></button>`;
        entriesDiv.appendChild(entryDiv);
      });
    }

    function deleteEntry(index) {
      entries.splice(index, 1);
      localStorage.setItem('journalEntries', JSON.stringify(entries));
      displayEntries();
    }

    saveBtn.addEventListener('click', () => {
      const text = entryInput.value.trim();
      if (!text) return;
      entries.unshift(text); // latest on top
      localStorage.setItem('journalEntries', JSON.stringify(entries));
      entryInput.value = '';
      displayEntries();
    });

    clearBtn.addEventListener('click', () => {
      if (confirm("Are you sure you want to delete all entries?")) {
        entries = [];
        localStorage.setItem('journalEntries', JSON.stringify(entries));
        displayEntries();
      }
    });

    displayEntries(); // initial display
  </script>
</body>
</html>
